<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShopEase - Contact</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <nav class="navbar">
      <a href="index.html" class="logo">ShopEase</a>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="products.html">Products</a>
        <a href="deals.html">Deals</a>
        <a href="about.html">About</a>
        <a href="contact.html" class="active">Contact</a>
      </div>
    </nav>
  </header>

  <main>
    <section class="page-banner">
      <h1>Contact Us</h1>
      <p>Have questions about orders, delivery or products? Send us a message.</p>
    </section>

    <section class="section contact-section">
      <form class="contact-form">
        <label for="name">Name</label>
        <input type="text" id="name" placeholder="Enter your name">

        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Enter your email">

        <label for="message">Message</label>
        <textarea id="message" rows="5" placeholder="How can we help?"></textarea>

        <button type="submit">Send Message</button>
      </form>

      <div class="contact-info">
        <h2>Customer Support</h2>
        <p>Email: ASSC@gmail.com</p>
        <p>Phone: +91 00000 00000</p>
        <p>Available: 9 AM - 9 PM</p>
      </div>
    </section>
  </main>
</body>
</html>
